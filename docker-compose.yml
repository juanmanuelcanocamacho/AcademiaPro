version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: testly-app
    restart: always
    ports:
      - "127.0.0.1:3001:3001"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - NEXTAUTH_URL=${NEXTAUTH_URL}
      - AUTH_SECRET=${AUTH_SECRET}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - AUTH_TRUST_HOST=true
    depends_on:
      - db
    networks:
      - testly-network
  db:
    image: postgres:15-alpine
    container_name: testly-db
    restart: always
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - testly_pgdata:/var/lib/postgresql/data
    networks:
      - testly-network

networks:
  testly-network:
    driver: bridge

volumes:
  testly_pgdata:
